services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mppt_mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - mppt

  influxdb:
    image: influxdb:2.8-alpine
    container_name: mppt_influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_ADMIN_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: mppt
      DOCKER_INFLUXDB_INIT_BUCKET: solar
      DOCKER_INFLUXDB_INIT_RETENTION: 0s
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN}
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - ./influxdb/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - mppt

  nodered:
    build: nodered
    container_name: mppt_nodered
    restart: unless-stopped
    ports:
      - "1880:1880"
    environment:
      TZ: Africa/Casablanca
      INFLUXDB_TOKEN: ${INFLUX_TOKEN}
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_ORG: mppt
      INFLUXDB_BUCKET: solar
      INFLUXDB_BUCKET_HISTORY: solar_history
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      ALERT_EMAIL: ${ALERT_EMAIL}
      NODE_RED_CREDENTIAL_SECRET: ${NODE_RED_CREDENTIAL_SECRET}
    volumes:
      - node-red-data:/data
    depends_on:
      influxdb:
        condition: service_healthy
      mosquitto:
        condition: service_started
    networks:
      - mppt

  grafana:
    image: grafana/grafana:12.4.1
    container_name: mppt_grafana
    restart: unless-stopped
    user: "472:472"
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      GF_USERS_ALLOW_SIGN_UP: false
      GF_AUTH_ANONYMOUS_ENABLED: false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - mppt

volumes:
  mosquitto_data:
  mosquitto_log:
  influxdb_data:
  grafana_data:
  mqtt_explorer_data:
  node-red-data:

networks:
  mppt:
    driver: bridge
